name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --all-extras

      - name: Run Ruff Lint
        working-directory: backend
        run: uv run ruff check src tests

      # Integration tests require live postgres-source (pagila) + redis on localhost:5434/6379.
      # CI workflow currently lacks service containers; full integration coverage is tracked as
      # a Polish-cluster task. Local dev/test runs everything with `docker compose up`.
      - name: Run Pytest
        working-directory: backend
        run: uv run pytest -q --ignore=tests/integration --ignore=tests/acceptance --ignore=tests/contract -m "not integration"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
      - name: Run TypeScript Compiler Check
        working-directory: ./frontend
        run: npx tsc --noEmit
