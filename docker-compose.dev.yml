# Development Docker Compose — QueryCraft Text-to-SQL Analytics Platform
# Usage: cp .env.example .env && docker compose -f docker-compose.dev.yml up -d
#
# MSSQL support (optional, ADR-10):
#   Requires system packages: unixODBC, freetds-dev, tdsodbc
#   See backend/Dockerfile for installation.
#   MySQL/MSSQL real-service tests are @pytest.mark.integration (not run in default CI).

services:
  postgres-platform:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PLATFORM_DB_NAME:-querycraft}
      POSTGRES_USER: ${PLATFORM_DB_USER:-querycraft}
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD:-querycraft_dev}
    ports:
      - "5433:5432"
    volumes:
      - platform-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_DB_USER:-querycraft}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - querycraft

  postgres-source:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SOURCE_DB_NAME:-source_analytics}
      # Bootstrap superuser (must differ from SOURCE_DB_USER used by the app)
      POSTGRES_USER: ${SOURCE_DB_SUPERUSER:-source_readonly}
      POSTGRES_PASSWORD: ${SOURCE_DB_SUPERUSER_PASSWORD:-source_dev}
    ports:
      - "5434:5432"
    volumes:
      - source-db-data:/var/lib/postgresql/data
      # Pagila init scripts (run on first init only — when source-db-data is empty):
      - ./dbTest/init/00-create-postgres-role.sql:/docker-entrypoint-initdb.d/00-create-postgres-role.sql:ro
      - ./dbTest/init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./dbTest/init/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./dbTest/init/03-grants.sql:/docker-entrypoint-initdb.d/03-grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_DB_SUPERUSER:-source_readonly}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - querycraft

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - querycraft

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./specs:/specs:ro
    depends_on:
      postgres-platform:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - querycraft

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - querycraft

  mysql-source:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sakila
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sakila_root_dev}
      MYSQL_USER: ${MYSQL_USER:-sakila_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sakila_dev_pwd}
    ports:
      - "3306:3306"
    volumes:
      - mysql-source-data:/var/lib/mysql
      - ./dbTest/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD:-sakila_root_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - querycraft

  mssql-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-AdventureWorks_dev_1433!}
    ports:
      - "1433:1433"
    volumes:
      - mssql-source-data:/var/opt/mssql
      - ./dbTest/mssql/backup:/var/opt/mssql/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD:-AdventureWorks_dev_1433!}\" -C -Q \"SELECT 1\""]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - querycraft

volumes:
  platform-db-data:
  source-db-data:
  mysql-source-data:
  mssql-source-data:

networks:
  querycraft:
    driver: bridge
