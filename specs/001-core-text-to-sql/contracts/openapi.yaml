          minLength: 1
          nullable: true
        password:
          type: string
          nullable: true
          writeOnly: true
          description: null or omitted = keep existing
        ssl_mode:
          type: string
          minLength: 1
          nullable: true
    ConnectionResponse:
      type: object
      required:
      - id
      - display_name
