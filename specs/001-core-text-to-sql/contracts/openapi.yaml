          - mysql
          - mssql
        host:
          type: string
        port:
          type: integer
        database_name:
          type: string
        username:
          type: string
        ssl_mode:
          type: string
        lifecycle_state:
          type: string
          enum:
          - active
          - disabled
        health_status:
          type: string
          enum:
          - untested
          - healthy
          - unhealthy
        last_health_check_at:
          type: string
          format: date-time
          nullable: true
        health_error_category:
          type: string
          nullable: true
        schema_introspection_status:
          type: string
          enum:
