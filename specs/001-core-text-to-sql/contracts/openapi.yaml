openapi: 3.1.0
info:
  title: "QueryCraft \u2014 Text-to-SQL Analytics Platform API"
  version: 1.0.0
  description: 'Phase 1 + Phase 2 API contract.

    This document is the single source of truth (Constitution Principle XII).

    Frontend types are generated from this specification.

    '
  contact:
    name: QueryCraft Team
servers:
- url: /api/v1
  description: API v1 base path
tags:
- name: Auth
  description: Authentication and session management
- name: Query
  description: Question submission, accept/reject/regenerate
- name: History
  description: Accepted query history
- name: Sessions
  description: Chat session management
- name: Feedback
  description: Feedback on query results
- name: Admin
  description: Administrative operations
paths:
  /auth/sign-in:
    post:
      operationId: signIn
      tags:
      - Auth
      summary: Authenticate with local credentials
      description: 'Signs in the provisional administrator with username/password.

        Returns a session cookie (HttpOnly, Secure, SameSite=Strict).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Sign-in successful. Session cookie set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (empty username or password).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /auth/sign-out:
    post:
      operationId: signOut
      tags:
      - Auth
      summary: End the current session
      description: Deletes the session from Redis and clears the cookie.
      security:
      - sessionCookie: []
      responses:
        '204':
          description: Session ended.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      operationId: getMe
      tags:
      - Auth
      summary: Get the current user profile
      description: Returns the authenticated user's profile. Used by the frontend to check session validity.
      security:
      - sessionCookie: []
      responses:
        '200':
          description: Authenticated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated or session expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /query/submit:
    post:
      operationId: submitQuestion
      tags:
      - Query
      summary: Submit a natural-language question
      description: 'Sends the question to the configured LLM provider, evaluates the

        generated SQL, executes it against the source database (if it passes),

        and returns the result. Enforces FR-030 (no concurrent submissions).

        '
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuestionRequest'
      responses:
        '200':
          description: Query generated, evaluated, and executed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
        '400':
          description: Question validation failed (empty, too long, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A question is already being processed for this session (FR-030).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 'The evaluator rejected the generated SQL (unsafe or

            references non-existent schema objects).

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluatorRejection'
        '502':
          description: LLM provider unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Source database query timed out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /query/accept:
    post:
      operationId: acceptQuery
      tags:
      - Query
      summary: Accept the current query result
      description: 'Persists the question, SQL, timestamp, user ID, and database ID

        to the accepted_queries table. Returns a confirmation.

        '
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptQueryRequest'
      responses:
        '201':
          description: Query accepted and persisted to history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedQuerySummary'
        '400':
          description: No active query result to accept.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /query/reject:
    post:
      operationId: rejectQuery
      tags:
      - Query
      summary: Reject the current query result and trigger one auto-retry
      description: 'Discards the current attempt, provides it as negative context to the

        LLM, and generates a new SQL attempt. If this is the second

        consecutive rejection (or the regenerated SQL is byte-equal),

        returns a "refine your question" response instead of a new result.

        '
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectQueryRequest'
      responses:
        '200':
          description: 'Either a new QueryResult (auto-retry succeeded) or a RefinePrompt

            (max retries reached or duplicate SQL). Discriminate on the `kind` field.

            '
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/QueryResult'
                - $ref: '#/components/schemas/RefinePrompt'
                discriminator:
                  propertyName: kind
                  mapping:
                    result: '#/components/schemas/QueryResult'
                    refine: '#/components/schemas/RefinePrompt'
        '400':
          description: No active query result to reject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: LLM provider unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Source database query timed out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /query/regenerate:
    post:
      operationId: regenerateQuery
      tags:
      - Query
      summary: Regenerate the current query (equivalent to reject + retry)
      description: 'Behaves identically to reject: discards current attempt, provides

        negative context, generates new SQL. Same one-retry limit applies.

        '
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectQueryRequest'
      responses:
        '200':
          description: 'Either a new QueryResult (retry succeeded) or a RefinePrompt

            (max retries reached or duplicate SQL). Discriminate on the `kind` field.

            '
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/QueryResult'
                - $ref: '#/components/schemas/RefinePrompt'
                discriminator:
                  propertyName: kind
                  mapping:
                    result: '#/components/schemas/QueryResult'
                    refine: '#/components/schemas/RefinePrompt'
        '400':
          description: No active query result to regenerate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: LLM provider unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Source database query timed out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /history:
    get:
      operationId: listHistory
      tags:
      - History
      summary: List accepted queries in reverse-chronological order
      description: 'Returns the user''s accepted query history using cursor-based pagination.

        Pass the `next_cursor` from a previous response to fetch the next page.

        Phase 1 frontend fetches the first page only; infinite scroll or

        load-more can be added without API changes.

        '
      security:
      - sessionCookie: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        description: Opaque cursor from a previous response's `next_cursor`. Omit for the first page.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        description: Number of entries per page (default 100, max 1000).
      responses:
        '200':
          description: List of accepted queries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /history/{query_id}:
    get:
      operationId: getHistoryEntry
      tags:
      - History
      summary: Get a single accepted query by ID
      description: Returns the full detail of an accepted query.
      security:
      - sessionCookie: []
      parameters:
      - name: query_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Accepted query detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedQueryDetail'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Query not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteHistoryEntry
      tags:
      - History
      summary: Delete a single saved query result
      description: Removes an accepted query from history. Does not cascade to session entries.
      security:
      - sessionCookie: []
      parameters:
      - name: query_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Query deleted successfully.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Query not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sessions:
    post:
      operationId: createSession
      tags:
      - Sessions
      summary: Create a new empty session
      description: Creates a new chat session for the authenticated user. Returns the session ID.
      security:
      - sessionCookie: []
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listSessions
      tags:
      - Sessions
      summary: List sessions for the current user
      description: Returns all chat sessions for the authenticated user, sorted by last activity descending.
      security:
      - sessionCookie: []
      responses:
        '200':
          description: List of sessions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags:
      - Sessions
      summary: Get session detail with conversation history
      description: Returns full session detail including all accepted query attempts.
      security:
      - sessionCookie: []
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Session detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteSession
      tags:
      - Sessions
      summary: Delete a session
      description: Deletes a chat session and cascade deletes all associated accepted queries.
      security:
      - sessionCookie: []
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Session deleted.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /feedback/{attemptId}:
    patch:
      operationId: updateFeedback
      tags:
      - Feedback
      summary: Update feedback on an accepted query
      description: Sets the user feedback (thumbs up/down) for a specific accepted query attempt.
      security:
      - sessionCookie: []
      parameters:
      - name: attemptId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeedbackRequest'
      responses:
        '200':
          description: Feedback updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Attempt not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid feedback value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/settings:
    get:
      operationId: getAdminSettings
      tags:
      - Admin
      summary: Get admin settings
      description: Returns current application settings including LLM context cap and regenerate attempts.
      security:
      - sessionCookie: []
      responses:
        '200':
          description: Current admin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateAdminSettings
      tags:
      - Admin
      summary: Update admin settings
      description: Updates application settings. Only provided fields are updated.
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminSettingsRequest'
      responses:
        '200':
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAdminSettingsResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid settings values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/refresh-schema:
    post:
      operationId: refreshSchema
      tags:
      - Admin
      summary: Force a schema introspection cache refresh
      description: 'Clears the cached schema metadata for the source database and performs

        a fresh introspection. Returns the updated schema statistics. If the

        refreshed schema exceeds `max_schema_tokens`, returns a 422 error.

        '
      security:
      - sessionCookie: []
      - AdminKey: []
      responses:
        '200':
          description: Schema refreshed successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                - tables_count
                - columns_count
                - refreshed_at
                properties:
                  tables_count:
                    type: integer
                  columns_count:
                    type: integer
                  approximate_tokens:
                    type: integer
                    description: Estimated token count of the schema context.
                  refreshed_at:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Schema exceeds configured token limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/connections:
    get:
      operationId: listAdminConnections
      tags:
      - Admin
      summary: List all source database connections
      security:
      - sessionCookie: []
      responses:
        '200':
          description: List of connections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionListResponse'
    post:
      operationId: createAdminConnection
      tags:
      - Admin
      summary: Create a new source database connection
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionCreate'
      responses:
        '201':
          description: Connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /admin/connections/{connectionId}:
    get:
      operationId: getAdminConnection
      tags:
      - Admin
      summary: Get a connection by ID
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
    put:
      operationId: updateAdminConnection
      tags:
      - Admin
      summary: Update an existing connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionUpdate'
      responses:
        '200':
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
    delete:
      operationId: deleteAdminConnection
      tags:
      - Admin
      summary: Hard-delete a connection (blocked if referenced)
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Deleted successfully
        '404':
          description: Connection not found
        '409':
          description: Connection is referenced
  /admin/connections/{connectionId}/disable:
    post:
      operationId: disableAdminConnection
      tags:
      - Admin
      summary: Disable an active connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
        '409':
          description: Already disabled
  /admin/connections/{connectionId}/enable:
    post:
      operationId: enableAdminConnection
      tags:
      - Admin
      summary: Re-enable a disabled connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
        '409':
          description: Already active
  /admin/connections/{connectionId}/test:
    post:
      operationId: testAdminConnection
      tags:
      - Admin
      summary: Test a connection's health
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'
        '404':
          description: Connection not found
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id
      description: 'Server-side session backed by Redis. HttpOnly, Secure, SameSite=Strict.

        8-hour idle expiry.

        '
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Admin endpoint authentication; configured via ADMIN_API_KEY env var.
  schemas:
    SignInRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: ^[\w.-]+$
        password:
          type: string
          minLength: 1
    UserProfile:
      type: object
      required:
      - id
      - username
      - display_name
      - role
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
    SubmitQuestionRequest:
      type: object
      required:
      - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          description: Natural-language question in English.
        session_id:
          type: string
          format: uuid
          nullable: true
          description: Chat session ID for follow-up context. Null for first message (lazy session creation).
    QueryResult:
      type: object
      required:
      - kind
      - attempt_id
      - question
      - generated_sql
      - columns
      - rows
      - row_count
      - attempt_number
      - is_last_auto_retry
      properties:
        kind:
          type: string
          enum:
          - result
          description: Discriminator field. Always "result" for QueryResult.
        attempt_id:
          type: string
          format: uuid
          description: Ephemeral ID for this generation attempt (used in accept/reject).
        session_id:
          type: string
          nullable: true
          description: Chat session ID this result belongs to. Null for legacy unsessioned results.
        question:
          type: string
        generated_sql:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMeta'
        rows:
          type: array
          items:
            type: array
            items: {}
          description: Array of row arrays. Each inner array corresponds to the column order.
        row_count:
          type: integer
          description: Total number of rows returned.
        attempt_number:
          type: integer
          description: 1 for first attempt, 2 for auto-retry.
        is_last_auto_retry:
          type: boolean
          description: True if this is the last automatic retry (attempt 2). UI shows indicator.
        accepted_query_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the auto-saved AcceptedQuery row. Present when submit/regenerate succeeded.
    ColumnMeta:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
        type:
          type: string
          description: PostgreSQL column type name.
    EvaluatorRejection:
      type: object
      required:
      - message_key
      - violations
      properties:
        message_key:
          type: string
          description: i18n key for the user-facing message (e.g., "query.evaluator.rejected").
        message_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Key-value map for interpolated values in the i18n template. Null if no params needed.
        violations:
          type: array
          items:
            $ref: '#/components/schemas/Violation'
    Violation:
      type: object
      required:
      - rule
      - message_key
      properties:
        rule:
          type: string
          description: Machine-readable rule identifier (e.g., "read_only_check", "schema_validation").
        message_key:
          type: string
          description: i18n key for the violation message (e.g., "evaluator.violation.dataModifying").
        message_params:
          type: object
          nullable: true
          additionalProperties: true
          description: 'Key-value map for interpolated values (e.g., {"table": "orders"}).'
    AttemptSummary:
      type: object
      required:
      - id
      - question_text
      - generated_sql
      - accepted_at
      - saved
      properties:
        id:
          type: string
          format: uuid
        question_text:
          type: string
        generated_sql:
          type: string
        accepted_at:
          type: string
          format: date-time
        saved:
          type: boolean
        feedback:
          type: integer
          nullable: true
          description: 1 for thumbs up, -1 for thumbs down, null if not rated.
        result_columns:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ColumnMeta'
        result_rows:
          type: array
          nullable: true
          items:
            type: array
            items: {}
        result_row_count:
          type: integer
          nullable: true
    SessionSummary:
      type: object
      required:
      - id
      - preview_text
      - created_at
      - last_activity_at
      properties:
        id:
          type: string
          format: uuid
        preview_text:
          type: string
        created_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
    SessionDetail:
      type: object
      required:
      - id
      - preview_text
      - created_at
      - last_activity_at
      - attempts
      properties:
        id:
          type: string
          format: uuid
        preview_text:
          type: string
        created_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/AttemptSummary'
    CreateSessionResponse:
      type: object
      required:
      - id
      - preview_text
      - created_at
      properties:
        id:
          type: string
          format: uuid
        preview_text:
          type: string
        created_at:
          type: string
          format: date-time
    SessionListResponse:
      type: object
      required:
      - items
      - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        total:
          type: integer
    UpdateFeedbackRequest:
      type: object
      required:
      - feedback
      properties:
        feedback:
          type: integer
          description: 1 for thumbs up, -1 for thumbs down.
        saved:
          type: boolean
          description: Mark the query as saved. Defaults to true when feedback is set.
    FeedbackResponse:
      type: object
      required:
      - id
      - feedback
      - saved
      properties:
        id:
          type: string
          format: uuid
        feedback:
          type: integer
        saved:
          type: boolean
    AdminSettingsResponse:
      type: object
      required:
      - llm_context_cap
      - max_regenerate_attempts
      properties:
        llm_context_cap:
          type: integer
          description: Number of previous conversation turns to include as context (0-10).
        max_regenerate_attempts:
          type: integer
          description: Maximum number of regenerate attempts allowed per query including the original.
    UpdateAdminSettingsRequest:
      type: object
      required:
      - llm_context_cap
      properties:
        llm_context_cap:
          type: integer
          minimum: 0
          maximum: 10
          description: Number of previous conversation turns to include as context (0-10).
        max_regenerate_attempts:
          type: integer
          minimum: 1
          description: Maximum number of regenerate attempts allowed per query including the original.
    UpdateAdminSettingsResponse:
      type: object
      required:
      - llm_context_cap
      - max_regenerate_attempts
      - updated_at
      properties:
        llm_context_cap:
          type: integer
        max_regenerate_attempts:
          type: integer
        updated_at:
          type: string
          format: date-time
    AcceptQueryRequest:
      type: object
      required:
      - attempt_id
      properties:
        attempt_id:
          type: string
          format: uuid
          description: The ephemeral attempt ID from QueryResult.
        session_id:
          type: string
          format: uuid
          nullable: true
          description: Chat session ID, optional for linking to sidebar session.
    RejectQueryRequest:
      type: object
      required:
      - attempt_id
      properties:
        attempt_id:
          type: string
          format: uuid
          description: The ephemeral attempt ID from QueryResult.
    AcceptedQuerySummary:
      type: object
      required:
      - id
      - question_text
      - generated_sql
      - accepted_at
      properties:
        id:
          type: string
          format: uuid
        question_text:
          type: string
        generated_sql:
          type: string
          description: The full evaluator-passed, user-accepted SQL. Included to enable client-side filtering across question
            text and SQL per FR-022.
        accepted_at:
          type: string
          format: date-time
    RefinePrompt:
      type: object
      required:
      - kind
      - message_key
      - should_refine
      properties:
        kind:
          type: string
          enum:
          - refine
          description: Discriminator field. Always "refine" for RefinePrompt.
        message_key:
          type: string
          description: i18n key for the user-facing message (e.g., "query.refine.message").
        message_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Key-value map for interpolated values in the i18n template. Null if no params needed.
        should_refine:
          type: boolean
          description: Always true. Signals the frontend to show the refine UI.
    HistoryListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AcceptedQuerySummary'
        total:
          type: integer
          nullable: true
          description: Total count of items matching filter; populated only on first-page requests (no cursor) for performance.
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page. Null if no more entries.
    AcceptedQueryDetail:
      type: object
      required:
      - id
      - question_text
      - generated_sql
      - llm_provider
      - accepted_at
      - database_connection_id
      properties:
        id:
          type: string
          format: uuid
        question_text:
          type: string
        generated_sql:
          type: string
        llm_provider:
          type: string
        accepted_at:
          type: string
          format: date-time
        database_connection_id:
          type: string
          format: uuid
        result_columns:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ColumnMeta'
          description: Column metadata from the executed query result.
        result_rows:
          type: array
          nullable: true
          items:
            type: array
            items: {}
          description: Row data from the executed query result.
        result_row_count:
          type: integer
          nullable: true
          description: Total row count from the executed query result.
    ErrorResponse:
      type: object
      required:
      - error
      - message_key
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message_key:
          type: string
          description: i18n key for the user-facing error message. The frontend translates via i18next.
        message_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Key-value map for interpolated values in the i18n template.
    ValidationErrorResponse:
      type: object
      required:
      - error
      - message_key
      - details
      properties:
        error:
          type: string
        message_key:
          type: string
          description: i18n key for the top-level validation error message.
        message_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Key-value map for interpolated values.
        details:
          type: array
          items:
            type: object
            required:
            - field
            - message_key
            properties:
              field:
                type: string
              message_key:
                type: string
                description: i18n key for the field-level validation error.
              message_params:
                type: object
                nullable: true
                additionalProperties: true
                description: 'Key-value map for interpolated values (e.g., {"max": 2000}).'
    ConnectionListResponse:
      type: object
      required:
      - connections
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionResponse'
    ConnectionCreate:
