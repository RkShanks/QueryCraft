          nullable: true
        message_key:
          type: string
          nullable: true
        tested_at:
          type: string
          format: date-time
  /admin/connections:
    get:
      operationId: listAdminConnections
      tags:
      - Admin
      summary: List all source database connections
      security:
      - sessionCookie: []
      responses:
        '200':
          description: List of connections
          content:
            application/json:
              schema:
                type: object
                required:
                - connections
                properties:
                  connections:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectionResponse'
    post:
      operationId: createAdminConnection
      tags:
      - Admin
      summary: Create a new source database connection
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionCreate'
      responses:
        '201':
          description: Connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /admin/connections/{connectionId}:
    get:
      operationId: getAdminConnection
      tags:
      - Admin
      summary: Get a connection by ID
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
    put:
      operationId: updateAdminConnection
      tags:
      - Admin
      summary: Update an existing connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionUpdate'
      responses:
        '200':
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
    delete:
      operationId: deleteAdminConnection
      tags:
      - Admin
      summary: Hard-delete a connection (blocked if referenced)
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Deleted successfully
        '404':
          description: Connection not found
        '409':
          description: Connection is referenced
  /admin/connections/{connectionId}/disable:
    post:
      operationId: disableAdminConnection
      tags:
      - Admin
      summary: Disable an active connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
        '409':
          description: Already disabled
  /admin/connections/{connectionId}/enable:
    post:
      operationId: enableAdminConnection
      tags:
      - Admin
      summary: Re-enable a disabled connection
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Connection enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
        '409':
          description: Already active
  /admin/connections/{connectionId}/test:
    post:
      operationId: testAdminConnection
      tags:
      - Admin
      summary: Test a connection's health
      security:
      - sessionCookie: []
      parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'
        '404':
          description: Connection not found
